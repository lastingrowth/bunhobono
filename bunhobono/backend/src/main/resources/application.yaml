server :
  port : 80

spring :
  mvc :
    view:
      prefix: /views/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: 10MB    #파일1개의 최대크기
      max-request-size: 40MB     #한번 요청시 전체크기(파일들의 크기합)

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/bono_db
    username: bono_user
    password: 123456

