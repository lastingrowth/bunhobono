Global:
  model_name: bono_ppocrv5_kor1
  debug: false
  use_gpu: true

  epoch_num: 100

  log_smooth_window: 20
  print_batch_step: 10

  save_model_dir: /mnt/c/kwon/python_work/bonopaddle/ocr_plate/03_train/ppocrv5_kor1/output
  save_epoch_step: 10
  eval_batch_step: [0, 200]

  cal_metric_during_train: true

  pretrained_model: /mnt/c/kwon/python_work/bonopaddle/ocr_plate/pretrained/korean_PP-OCRv5_mobile_rec_pretrained.pdparams
  checkpoints:
  save_inference_dir:

  use_visualdl: false

  infer_img: /mnt/c/kwon/python_work/bonopaddle/data/crop_images/test/img_000012.jpg

  character_dict_path: /mnt/c/kwon/python_work/bonopaddle/PaddleOCR/ppocr/utils/dict/ppocrv5_korean_dict.txt
  max_text_length: &max_text_length 25

  infer_mode: false
  use_space_char: true
  distributed: true

  save_res_path: /mnt/c/kwon/python_work/bonopaddle/ocr_plate/03_train/ppocrv5_kor1/predicts_bono_ppocrv5_kor1.txt
  d2s_train_image_shape: [3, 48, 320]


Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001
    warmup_epoch: 3
  regularizer:
    name: L2
    factor: 3.0e-05


Architecture:
  model_type: rec
  algorithm: SVTR_LCNet

  Transform:

  Backbone:
    name: PPLCNetV3
    scale: 0.95

  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001

      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length


Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:


PostProcess:
  name: CTCLabelDecode


Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False


Train:
  dataset:
    name: MultiScaleDataSet
    ds_width: false

    data_dir: /mnt/c/kwon/python_work/bonopaddle/data

    label_file_list:
      - /mnt/c/kwon/python_work/bonopaddle/data/ocr_labels_fixed/train.txt

    ratio_list:
      - 1.0

    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false

      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode

      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio

  sampler:
    name: MultiScaleSampler
    scales: [[320, 32], [320, 48], [320, 64]]
    first_bs: &bs 64
    fix_bs: false
    divided_factor: [8, 16]
    is_training: True

  loader:
    shuffle: true
    batch_size_per_card: *bs
    drop_last: true
    num_workers: 4


Eval:
  dataset:
    name: SimpleDataSet

    data_dir: /mnt/c/kwon/python_work/bonopaddle/data

    label_file_list:
      - /mnt/c/kwon/python_work/bonopaddle/data/ocr_labels_fixed/val.txt

    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false

      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode

      - RecResizeImg:
          image_shape: [3, 48, 320]

      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio

  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 4